<!DOCTYPE html>
<html lang = "en">

<head>
<meta charset = "UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Profile card</title>

<link href = "https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
</head>

<body>

    <div class = "card">

        <div class = "status-row">
            <div class = "status-dot"></div>
            <span class = "status-text">Available for work</span>
        </div>

        <div class = "avatar-wrap">
        <div class = "avatar" >
            NG
        <div class = "avatar-badge">◆</div>
        </div>
        <div class = "meta">
            <h1 class = "name">NeelapuGovindarao</h1>
            <p class = "role">Aspiring Software Developer</p>
        </div>
        </div>
        <div class = "tags">
            <span class = "tag">HTML &amp;CSS</span>
            <span class = "tag">JavaScript</span>
            <span class = "tag">React</span>
            <span class = "tag">Node.js</span>
            <span class = "tag">Figma</span>
        </div>
        <div class = "divider"></div>
    <div class="stats">
    <div class="stat">
        <span class ="stat-num">42</span>
        <span class ="stat-label">Projects</span>
    </div>
    <div class="stat">
        <span class="stat-num">3yr</span>
        <span class="stat-label">Experience</span>
    </div>
    <div class="stat">
        <span class="stat-num">18</span>
        <span class="stat-label">Clients</span>
    </div>
</div>
    </div>
</body>

</html>
